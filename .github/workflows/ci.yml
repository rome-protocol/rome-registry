name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Secret scanning is handled by GitHub's native, always-on secret scanning +
# push protection (free on public repos) plus CodeQL — no self-hosted scanner
# job here (gitleaks-action requires a paid license for organizations).

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
