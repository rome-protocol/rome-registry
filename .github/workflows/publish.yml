# npm publish — gated, provenance-signed.
#
# Operator setup before the first run (one-time):
#   1. Claim the npm `@rome-protocol` org (owns the scope).
#   2. Repo Settings -> Environments -> create `npm-publish` with a REQUIRED
#      REVIEWER (the human gate — every publish waits for approval).
#   3. Either add repo secret `NPM_TOKEN` (granular, org-scoped, read+write), OR
#      configure this repo as a Trusted Publisher on the npm package (OIDC, no token).
#
# Provenance requires a PUBLIC repo — this only succeeds after Sanjeev flips the repo.
name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish # required-reviewer gate; publish waits for approval
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build --if-present
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
